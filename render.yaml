services:
  - type: web
    name: diamond-queen-backend
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false  # You must set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure secret
      - key: GEMINI_API_KEY
        sync: false  # You must set this manually in Render dashboard
      - key: RAZORPAY_KEY
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false  # Set to your Render frontend URL after deployment
